services:
  postgres:
    image: postgres:16-alpine
    container_name: cobranzas-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: cobranzas
      POSTGRES_USER: cobranzas
      POSTGRES_PASSWORD: cobranzas_local
    ports:
      - "5434:5432"
    volumes:
      - cobranzas_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cobranzas -d cobranzas"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cobranzas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - cobranzas_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cobranzas-minio
    restart: unless-stopped
    command: server /data --console-address ":9101"
    environment:
      MINIO_ROOT_USER: cobranzas
      MINIO_ROOT_PASSWORD: cobranzas_local
    ports:
      - "9100:9000"
      - "9101:9101"
    volumes:
      - cobranzas_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 cobranzas cobranzas_local &&
      mc mb --ignore-existing local/recordings &&
      mc mb --ignore-existing local/imports &&
      mc mb --ignore-existing local/attachments &&
      exit 0
      "

volumes:
  cobranzas_pg_data:
  cobranzas_redis_data:
  cobranzas_minio_data:
